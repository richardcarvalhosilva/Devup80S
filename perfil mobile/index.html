<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exemplo de layout de perfil mobile responsivo">
    <link rel="stylesheet" href="style.css">
    <title>Perfil Mobile</title>
</head>
<body>
    <div class="phone">
        <header class="topbar">
            <button class="icon-btn" aria-label="Voltar">←</button>
            <h1>Perfil</h1>
            <button class="icon-btn" aria-label="Mais opções">⋯</button>
        </header>

        <main class="profile-card">
            <section class="profile-header">
                <img src="imagens/retro.png" alt="Foto de perfil" class="avatar">
                <div class="profile-info">
                    <h2>BrechoRetro</h2>
                    <p class="username">@BrechoRetro</p>
                    <span class="role">Empresária</span>
                    <a class="location" href="https://maps.app.goo.gl/baYYjubtXhoRUh8p9" target="_blank" rel="noopener noreferrer">Localização</a>
                </div>
            </section>

            <section class="stats">
                <div>
                    <strong>120</strong>
                    <span>Posts</span>
                </div>
                <div>
                    <strong>8.4k</strong>
                    <span>Seguidores</span>
                </div>
                <div>
                    <strong>320</strong>
                    <span>Seguindo</span>
                </div>
            </section>

            <section class="actions">
                <button class="primary-btn">Seguir</button>
                <button class="secondary-btn">Mensagem</button>
            </section>

            <section class="about">
                <h3>Sobre</h3>
                <p>Cada peça tem uma história. Nosso brechó oferece roupas escolhidas com carinho para renovar seu estilo.</p>
            </section>

            <section class="gallery">
                <div class="photo"></div>
                <div class="photo"></div>
                <div class="photo"></div>
                <div class="photo"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
